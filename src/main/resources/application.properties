spring.application.name=HeliosGreenLightSolar

# ===== DATABASE =====
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== FILE UPLOAD =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.web.resources.add-mappings=false

# ===== JWT =====
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# ===== AWS S3 =====
aws.s3.bucket-name=${AWS_S3_BUCKET}
aws.s3.region=${AWS_REGION}
aws.accessKeyId=${AWS_ACCESS_KEY_ID}
aws.secretAccessKey=${AWS_SECRET_ACCESS_KEY}

# ===== AWS SES (unused for now, kept for future) =====
aws.ses.sender-email=${AWS_SES_SENDER_EMAIL:placeholder@example.com}

# ===== GMAIL SMTP =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# ===== EMAIL SENDER =====
app.email.sender=${GMAIL_USERNAME}

# ===== CORS =====
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}








